<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic New Weather — Daily Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Archivo+Black&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808;
      --off-black: #111111;
      --card: #161616;
      --border: #2a2a2a;
      --red: #E8230A;
      --red-dim: #9e1a07;
      --cyan: #00C8C8;
      --white: #f0f0f0;
      --muted: #666;
      --warm: #c8a882;
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* film grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: overlay;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 60px 24px 40px;
      overflow: hidden;
    }

    /* radial glow behind logo */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse, rgba(232,35,10,0.12) 0%, rgba(0,200,200,0.06) 40%, transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      width: min(180px, 35vw);
      margin-bottom: 4px;
      animation: fadeIn 1s ease both;
      position: relative;
      z-index: 1;
      opacity: 0.85;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      animation: fadeIn 1s ease 0.2s both;
    }

    /* ── WEATHER CARD ── */
    .weather-card {
      width: min(680px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      position: relative;
      animation: slideUp 0.8s ease 0.3s both;
      z-index: 1;
    }

    .card-top-bar {
      background: var(--red);
      padding: 6px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-top-bar span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: white;
    }

    .card-body {
      padding: 28px 28px 24px;
    }

    .card-date {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .score-headline-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .headline-block { flex: 1; }

    .weather-headline {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1;
      color: var(--white);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .penalties {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .penalty-pill {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red-dim);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .score-block {
      text-align: center;
      flex-shrink: 0;
    }

    .score-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(5.5rem, 16vw, 9rem);
      line-height: 1;
      color: var(--red);
      display: block;
      text-shadow: 0 0 60px rgba(232,35,10,0.35);
    }

    .score-denom {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SYNOPSIS ── */
    .synopsis-block {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .label {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .synopsis-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--white);
      border-left: 2px solid var(--red);
      padding-left: 14px;
      min-height: 32px;
    }

    .synopsis-text.loading {
      color: var(--muted);
      font-style: italic;
      animation: pulse 1.6s ease infinite;
    }

    .edit-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: flex-start;
    }

    .edit-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .edit-btn:hover { border-color: var(--white); color: var(--white); }

    .synopsis-textarea {
      display: none;
      width: 100%;
      background: #0e0e0e;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 10px 14px;
      resize: vertical;
      outline: none;
      min-height: 72px;
    }

    .save-btn {
      display: none;
      background: var(--red);
      color: white;
      border: none;
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── OUTFIT ── */
    .outfit-block {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .outfit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .outfit-tag {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 5px 12px;
      color: var(--warm);
      animation: popIn 0.3s ease both;
    }

    /* ── FORECAST ROW ── */
    .forecast-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .forecast-day {
      background: var(--card);
      padding: 10px 8px;
      text-align: center;
    }

    .f-day { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .f-hi { font-family: 'Archivo Black', sans-serif; font-size: 1rem; color: var(--white); }
    .f-rain { font-size: 0.55rem; color: var(--cyan); margin-top: 3px; letter-spacing: 0.05em; }

    /* ── SMS BLOCK ── */
    .sms-block {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .sms-hed {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.1rem;
      color: var(--white);
      margin-bottom: 6px;
    }

    .sms-sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .sms-inputs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sms-input {
      flex: 1;
      min-width: 160px;
      background: #0e0e0e;
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 0.05em;
    }
    .sms-input::placeholder { color: #444; }
    .sms-input:focus { border-color: var(--red); }

    .sms-btn {
      background: var(--red);
      color: white;
      border: none;
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .sms-btn:hover { background: #c01e07; }
    .sms-btn:disabled { background: #1a4a25; cursor: default; }

    .sms-note { font-size: 0.55rem; color: #444; letter-spacing: 0.08em; margin-top: 8px; }
    .success-msg { display: none; font-size: 0.7rem; color: #4a9a5a; letter-spacing: 0.1em; text-transform: uppercase; padding-top: 8px; }

    /* ── FOOTER ── */
    .site-footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
      border-top: 1px solid #1a1a1a;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn   { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
    @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    @media (max-width: 500px) {
      .score-num { font-size: 5rem; }
      .weather-headline { font-size: 2.2rem; }
      .card-body { padding: 20px 16px; }
      .sms-inputs { flex-direction: column; }
    }
  </style>
</head>

<script>
// ── DATE ──
document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
});

// ── WEATHER DATA — LIVE via OpenWeatherMap ──
const OWM_KEY = "4d80518071601acf124540cccbb5659b";
const OWM_CITY = "New York";

const CACHE_KEY = 'cnw_weather';
const CACHE_VERSION = 'v3'; // bump this to bust all device caches
const CACHE_TTL_MS = 30 * 60 * 1000; // 30 minutes

function getTodayKey() {
  return new Date().toDateString();
}

function getCachedWeather() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { dateKey, data, version, cachedAt } = JSON.parse(raw);
    // Bust cache if version mismatch OR stale date OR TTL expired
    if (version !== CACHE_VERSION) return null;
    if (dateKey !== getTodayKey()) return null;
    if (Date.now() - cachedAt > CACHE_TTL_MS) return null;
    return data;
  } catch(e) {
    return null;
  }
}

function setCachedWeather(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      dateKey: getTodayKey(),
      version: CACHE_VERSION,
      cachedAt: Date.now(),
      data
    }));
  } catch(e) {}
}

function bustCache() {
  try { localStorage.removeItem(CACHE_KEY); } catch(e) {}
}

async function fetchWeather() {
  const cached = getCachedWeather();
  if (cached) return cached;

  try {
    const res = await fetch('/.netlify/functions/get-daily');
    const row = await res.json();
    if (!row || row.error) throw new Error('Function error');

    const data = {
      temp: row.temp,
      feelsLike: row.feels_like,
      condition: row.condition,
      humidity: row.humidity,
      precipChance: row.precip_chance,
      windSpeed: row.wind_speed,
      forecast: row.forecast,
      synopsisApproved: row.synopsis_approved,
      synopsisDraft: row.synopsis_draft,
      approved: row.approved,
      score: row.score,
      penalties: row.penalties,
      updatedAt: row.updated_at  // used for cache busting
    };

    setCachedWeather(data);
    return data;
  } catch(err) {
    console.error('fetchWeather error:', err);
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) return JSON.parse(raw).data;
    } catch(e) {}
    return {
      temp: 45, feelsLike: 40, condition: "Cloudy",
      humidity: 65, precipChance: 20, windSpeed: 10,
      forecast: [], synopsisApproved: null, synopsisDraft: null,
      approved: false, score: null, penalties: []
    };
  }
}

// ── SCORING RUBRIC ──
function scoreWeather(w) {
  let score = 10;
  const penalties = [];
  const t = w.temp;

  if (t >= 70 && t <= 77)      {}
  else if ((t >= 65 && t < 70) || (t > 77 && t <= 82)) { score -= 1; }
  else if (t >= 58 && t < 65)  { score -= 2; penalties.push("a bit cool"); }
  else if (t >= 50 && t < 58)  { score -= 3; penalties.push("chilly"); }
  else if (t >= 42 && t < 50)  { score -= 4; penalties.push("cold out"); }
  else if (t >= 35 && t < 42)  { score -= 5; penalties.push("cold af"); }
  else if (t >= 28 && t < 35)  { score -= 7; penalties.push("freezing"); }
  else if (t < 28)              { score -= 8; penalties.push("BRUTAL"); }
  else if (t > 82 && t <= 88)  { score -= 2; penalties.push("hot"); }
  else if (t > 88)              { score -= 4; penalties.push("too hot"); }

  const chill = w.temp - w.feelsLike;
  if (chill >= 15)      { score -= 3; penalties.push("wind chill nasty"); }
  else if (chill >= 8)  { score -= 2; penalties.push("wind making it worse"); }
  else if (chill >= 4)  { score -= 1; penalties.push("some wind chill"); }

  if (w.precipChance > 70)      { score -= 3; penalties.push("heavy rain"); }
  else if (w.precipChance > 45) { score -= 2; penalties.push("real rain chance"); }
  else if (w.precipChance > 20) { score -= 1; penalties.push("light rain possible"); }

  if (w.humidity > 80)      { score -= 2; penalties.push("humid & heavy"); }
  else if (w.humidity > 68) { score -= 1; penalties.push("a lil humid"); }

  if (w.condition.toLowerCase().includes('cloud') && w.precipChance < 20) {
    score -= 1; penalties.push("overcast");
  }

  return { score: Math.max(1, Math.min(10, score)), penalties };
}

function gradeHeadline(score) {
  if (score >= 9) return "A Perfect Day";
  if (score >= 7) return "Pretty Solid";
  if (score >= 5) return "Decent Enough";
  if (score >= 3) return "Rough Out There";
  return "Stay Inside";
}

function outfitForWeather(temp, rain) {
  let outerwear, top, bottom, shoes, extras = [];

  // OUTERWEAR
  if (temp < 30)       outerwear = "heavy coat";
  else if (temp < 40)  outerwear = "heavy coat";
  else if (temp < 50)  outerwear = "coat / jacket";
  else if (temp < 60)  outerwear = "light jacket";
  else if (temp < 68)  outerwear = "layer up";
  else                 outerwear = null;

  // TOP
  if (temp < 40)       top = "heavy sweater / hoodie";
  else if (temp < 55)  top = "hoodie / sweatshirt";
  else if (temp < 68)  top = "long sleeve";
  else                 top = "tee";

  // BOTTOM
  if (temp < 45)       bottom = "heavy pants / sweats";
  else if (temp < 65)  bottom = "jeans / pants";
  else                 bottom = "shorts / light pants";

  // SHOES
  if (temp < 35 || rain > 60)  shoes = "waterproof boots";
  else if (temp < 55)           shoes = "boots";
  else                          shoes = "sneakers";

  // EXTRAS
  if (temp < 32)  extras.push("hat + gloves");
  else if (temp < 42) extras.push("beanie");
  if (rain > 30)  extras.push("umbrella ☂");

  const items = [outerwear, top, bottom, shoes, ...extras].filter(Boolean);
  return items;
}

// ── RENDER ──
async function init() {
  const weather = await fetchWeather();
  const { score, penalties } = scoreWeather(weather);

  document.getElementById('weather-headline').textContent = gradeHeadline(score);
  document.getElementById('score-num').textContent = score;

  document.getElementById('penalties').innerHTML = penalties
    .map(p => `<span class="penalty-pill">↓ ${p}</span>`).join('');

  document.getElementById('outfit-tags').innerHTML = outfitForWeather(weather.temp, weather.precipChance)
    .map((item, i) => `<span class="outfit-tag" style="animation-delay:${i*0.06}s">${item}</span>`).join('');

  document.getElementById('forecast-strip').innerHTML = weather.forecast.map(d => `
    <div class="forecast-day">
      <div class="f-day">${d.day}</div>
      <div class="f-hi">${Math.round(d.high)}°</div>
      <div class="f-rain">${d.rain > 0 ? d.rain + '%' : 'dry'}</div>
    </div>`).join('');

  // Load synopsis — server is source of truth now
  const synopsisEl = document.getElementById('synopsis-text');
  const now = new Date();
  const pastCutoff = now.getHours() >= 9;

  if (weather.approved && weather.synopsisApproved) {
    // Admin approved — show it
    synopsisEl.textContent = weather.synopsisApproved;
    synopsisEl.classList.remove('loading');
  } else if (pastCutoff && weather.synopsisDraft) {
    // Past 9 AM — auto-publish draft
    synopsisEl.textContent = weather.synopsisDraft;
    synopsisEl.classList.remove('loading');
  } else if (pastCutoff) {
    // Past 9 AM, no draft — generate one now
    generateSynopsis(weather, score, penalties).then(text => {
      synopsisEl.textContent = text;
      synopsisEl.classList.remove('loading');
    });
  } else {
    synopsisEl.textContent = "check back at 9 AM for today's vibe.";
    synopsisEl.classList.remove('loading');
  }
}

init();

// ── CLAUDE API SYNOPSIS ──
async function generateSynopsis(w, score, penalties) {
  try {
    const res = await fetch('/.netlify/functions/generate-synopsis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        temp: w.temp, feelsLike: w.feelsLike, condition: w.condition,
        precipChance: w.precipChance, humidity: w.humidity,
        windSpeed: w.windSpeed, score, penalties
      })
    });
    const data = await res.json();
    return data.text || fallback(score, w);
  } catch(e) {
    return fallback(score, w);
  }
}

function fallback(score, w) {
  if (w.temp < 40 && w.precipChance > 60) return `${Math.round(w.temp)}° and wet out here. not the day. ${score}/10.`;
  if (w.temp < 40) return `cold af — bundle up. ${Math.round(w.temp)}° and the wind not playing. ${score}/10.`;
  if (w.precipChance > 60) return `rain coming through today. umbrella up no cap. ${score}/10.`;
  return `${Math.round(w.temp)}° out there. ${score}/10 — could be worse cousins.`;
}

generateSynopsis(weather, score, penalties).then(text => {
  const el = document.getElementById('synopsis-text');
  el.textContent = text;
  el.classList.remove('loading');
  document.getElementById('edit-btn').style.display = 'inline-block';
  document.getElementById('synopsis-textarea').value = text;
});

// ── PHONE FORMAT ──
document.getElementById('phone-input').addEventListener('input', function(e) {
  let val = e.target.value.replace(/\D/g,'').slice(0,10);
  let fmt = '';
  if (val.length >= 1) fmt = '+1 (' + val.slice(0,3);
  if (val.length >= 4) fmt += ') ' + val.slice(3,6);
  if (val.length >= 7) fmt += '-' + val.slice(6,10);
  e.target.value = fmt;
});

// ── SIGNUP ──
async function handleSignup() {
  const phone = document.getElementById('phone-input').value;
  const name = document.getElementById('name-input').value;
  if (phone.replace(/\D/g,'').length < 10) {
    document.getElementById('phone-input').style.borderColor = 'var(--red)';
    document.getElementById('phone-input').focus();
    return;
  }
  const btn = document.getElementById('sms-btn');
  btn.disabled = true;
  btn.textContent = 'SAVING…';

  try {
    const res = await fetch('/.netlify/functions/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, name })
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('success-msg').style.display = 'block';
      document.getElementById('phone-input').disabled = true;
      document.getElementById('name-input').disabled = true;
      btn.textContent = 'SUBSCRIBED ✔';
    } else {
      btn.disabled = false;
      btn.textContent = 'TEXT ME →';
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'TEXT ME →';
  }
}

})();
